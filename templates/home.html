
{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- ========================= SECTION MAIN ========================= -->
<section class="section-intro padding-y-sm">
  <div class="container">
    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4" aria-label="Slide 5"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="5" aria-label="Slide 6"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="6" aria-label="Slide 7"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="7" aria-label="Slide 8"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="8" aria-label="Slide 9"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="9" aria-label="Slide 10"></button>
       
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="{% static 'images/banners/1.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/2.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/3.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/4.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/5.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/6.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/7.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/8.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/9.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
        <div class="carousel-item">
          <img src="{% static 'images/banners/10.png' %}" class="d-block w-100 img-fluid rounded" alt="...">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div> <!-- container //  -->
</section>
<!-- ========================= SECTION MAIN END// ========================= -->

<!-- ========================= SECTION  ========================= -->
<section class="section-name padding-y-sm">
  <div class="container">

    <header class="section-heading">
      <a href="{% url 'store'%}" class="btn btn-outline-primary float-right">Ver Todo</a>
      <h3 class="section-title">Productos populares</h3>
    </header><!-- sect-heading -->


    <div class="row">
    {% for product in products %}
      <div class="col-md-3">
        <div class="card card-product-grid">
          <a href="{{ product.get_url }}" class="img-wrap"> <img src="{{product.images.url}}"> </a>
          <figcaption class="info-wrap">
            <a href="{{ product.get_url }}" class="title">{{product.product_name}}</a>
            <div class="price mt-1">$ {{product.price}}</div> <!-- price-wrap.// -->

            <div class="rating-star">
              <span>
                    <i class="fa fa-star{% if product.averageReview < 0.5 %}-o{% elif product.averageReview >= 0.5 and product.averageReview < 1 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 1.5 %}-o{% elif product.averageReview >= 1.5 and product.averageReview < 2 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 2.5 %}-o{% elif product.averageReview >= 2.5 and product.averageReview < 3 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 3.5 %}-o{% elif product.averageReview >= 3.5 and product.averageReview < 4 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 4.5 %}-o{% elif product.averageReview >= 4.5 and product.averageReview < 5 %}-half-o {% endif %}" aria-hidden="true"></i>
              </span>
            </div>

          </figcaption>
        </div>
      </div> <!-- col.// -->
     {%endfor%}

  </div><!-- container // -->
</section>
<!-- ========================= SECTION  END// ========================= -->





</body>
</html>

{% endblock %}
